# Render Blueprint — Streamlit Review Discovery Engine
# Deploy: push repo to GitHub, then Render → New → Blueprint → pick this repo.
services:
  - type: web
    name: review-discovery-engine
    runtime: python
    plan: free                      # 512 MB RAM; upgrade to "starter" if it OOMs
    region: oregon                  # change if you prefer another region
    # Install deps, then regenerate the precomputed metrics from the FROZEN
    # dataset (runs existing engine; does not modify data or engine logic).
    buildCommand: "pip install -r requirements.txt && python engine/precompute.py"
    # Streamlit must bind to Render's $PORT and 0.0.0.0. On Render the `streamlit`
    # console script is on PATH after pip install (Render's clean venv).
    startCommand: "streamlit run dashboard/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --server.enableCORS false"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: "false"
    healthCheckPath: /_stcore/health
    autoDeploy: true
